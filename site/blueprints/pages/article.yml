title: Article
num: '{{ page.date.toDate("Ymd") }}'
icon: 📖

status:
  draft:
    label: Draft
    text: The article is still in draft mode. It can only be seen by editors with panel access.
  unlisted:
    label: In Review
    text: The article is online and can be visited with the direct URL. The team must still give the final go to publish it.
  listed:
    label: Published
    text: The article is online and listed in the blog

tabs:
  content:
    columns:
      main:
        width: 2/3
        fields:
          cover:
            headline: Cover
            template: cover
            type: files
          text:
            type: editor
            size: large
      sidebar:
        width: 1/3
        sections:
          meta:
            type: fields
            fields:
              date:
                type: date
                time: true
                default: now
              author:
                type: users
                multiple: false
              tags:
                type: tags
              related:
                label: Related articles
                type: pages
                query: page.siblings(false)
              files:
                type: files
                headline: Files
  seo:
    columns:
      - width: 1/2
        fields:
          metatitle:
            label: Meta title
            type: text
          metadescription:
            label: Meta description
            type: textarea
            size: small
            maxlength: 200
          metatags:
            label: Meta Tags
            type: radio
            default: indexfollow
            options:
              - value: index,follow
                text: index,follow
              - value: noindex,follow
                text: noindex,follow
              - value: index,nofollow
                text: index,nofollow
              - value: noindex,nofollow
               text: noindex,nofollow
      - width: 1/2
        sections:
          seopreview:
            type:                seopreview
    #       options:             defaults:
            headline:            SEO preview
            titleField:          metatitle              # field key reference
            defaultTitle:        page.title             # query (e.g: page.myCustomSeoTitle)
            descriptionField:    metadescription        # field key reference
            defaultDescription:  page.text.blocks.html  # query (e.g: page.text.blocks.html when using the editor)

