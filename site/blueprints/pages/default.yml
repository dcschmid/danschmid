title: Default Page
tabs:
  content:
    columns:
      main:
        width: 2/3
        fields:
          text:
            type: textarea
            size: huge
      sidebar:
        width: 1/3
        sections:
          meta:
            type: fields
            fields:
              related:
                label: Related articles
                type: pages
                query: page.siblings(false)
  seo:
    columns:
      - width: 1/2
        fields:
          metatitle:
            label: Meta title
            type: text
          metadescription:
            label: Meta description
            type: textarea
          metatags:
            label: Meta Tags
            type: radio
            default: noindexnofollow
            options:
              indexfollow: index,follow
              noindexfollow: noindex,follow
              indexfollow: index,nofollow
              noindexnofollow: noindex,nofollow
      - width: 1/2
        sections:
          seopreview:
            type:                seopreview
            headline:            SEO preview
            titleField:          metatitle              # field key reference
            defaultTitle:        page.title             # query (e.g: page.myCustomSeoTitle)
            descriptionField:    metadescription        # field key reference
            defaultDescription:  page.text.blocks.html  # query (e.g: page.text.blocks.html when using the editor)
